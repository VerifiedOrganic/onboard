name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go vet ./...
      - run: go test -race ./...
      - name: Coverage gate
        run: |
          pkgs=$(go list ./cmd/... ./internal/... | grep -v precision)
          go test -coverprofile=coverage.out $pkgs
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "total coverage (excl. precision toolchain): ${pct}%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 65) { print "coverage below 65% floor"; exit 1 } }'

  test-cross-os:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Test on macOS
        if: matrix.os == 'macos-latest'
        run: go test -race ./...
      - name: Test on Windows
        if: matrix.os == 'windows-latest'
        run: go test ./...

  toolchain-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: dtolnay/rust-toolchain@stable
      - run: rustup component add rust-analyzer
      - name: Run toolchain-gated tests (skips are failures)
        env:
          ONBOARD_TEST_REQUIRE_TOOLCHAIN: "1"
        run: |
          go test -v ./internal/providers/ ./internal/scan/ ./internal/git/ ./internal/guide/ ./internal/server/ ./internal/precision/ 2>&1 | tee /tmp/toolchain-tests.out
          ! grep -E -- '--- SKIP' /tmp/toolchain-tests.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0
      - run: golangci-lint run ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go build -trimpath -ldflags "-s -w" ./...
